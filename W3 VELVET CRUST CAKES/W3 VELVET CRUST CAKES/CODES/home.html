<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Crust Cake | Home</title>
    <style>
        :root {
            --dark-berry: #3a0d0d;
            --soft-pink: rgba(255, 182, 193, 0.4);
            --cream: #fdf5e6;
            --cream-hover: #f5deb3;
            --glass-white: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark-berry);
            color: #ffffff;
            min-height: 100vh;
        }

        /* --- Navigation with Creamy Buttons --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 8%;
            background: var(--soft-pink);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .nav-brand img { height: 50px; width: auto; }
        .brand-name { font-size: 1.6rem; font-weight: bold; color: var(--cream); }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* The Creamy Pill Buttons */
        .btn-cream {
            background: var(--cream);
            color: var(--dark-berry) !important;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
            border: none;
            display: inline-block;
        }

        .btn-cream:hover {
            background: var(--cream-hover);
            transform: translateY(-2px);
        }


        .profile-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--cream);
            transition: 0.3s;
            display: block;
            background: var(--glass-white);
        }

        .profile-circle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--cream);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Sliding Hero Banner --- */
        .hero-banner {
            position: relative;
            height: 450px;
            margin: 30px auto;
            width: 90%;
            max-width: 1100px;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .slider {
            display: flex;
            width: 300%;
            height: 100%;
            animation: slideAnimation 15s infinite ease-in-out;
        }

        .slider img {
            width: 33.33%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes slideAnimation {
            0%, 25% { transform: translateX(0); }
            33%, 58% { transform: translateX(-33.33%); }
            66%, 91% { transform: translateX(-66.66%); }
            100% { transform: translateX(0); }
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(58, 13, 13, 0.9));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px;
            pointer-events: none;
        }

        /* --- Content Layout --- */
        .main-card {
            background: var(--glass-white);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            margin: 0 auto 40px;
            width: 90%;
            max-width: 1100px;
        }

        .trending-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .cake-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .cake-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border);
        }

        .cake-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-brand">
            <img src="logo.png" alt="Logo">
            <span class="brand-name"> Velvet Crust Cake </span>
        </a>

        <div class="nav-links">
            <a href="index.html" class="btn-cream">Home</a>
            <a href="shop.html" class="btn-cream">Shop</a>
            <a href="summary.html" class="btn-cream"> Cart (<span id="cart-count">0</span>)</a>
            
            <a href="login.html" class="profile-circle">
                <img src="avatar.png" alt="User">
            </a>
        </div>
    </nav>

    <div class="hero-banner">
        <div class="slider">
            <img src="banner1.jpg" alt="Banner 1">
            <img src="banner2.jpg" alt="Banner 2">
            <img src="banner3.jpg" alt="Banner 3">
        </div>
        <div class="hero-overlay">
            <h1 style="margin: 0; color: var(--cream); font-size: 3rem; text-transform: uppercase;"> Artisan Crusts </h1>
            <p style="color: #fce4ec; font-size: 1.2rem;"> Handcrafted sweetness in every slide. </p>
        </div>
    </div>

    <div class="main-card">
        <h2 style="color: var(--cream); letter-spacing: 2px; margin-bottom: 30px;"> Trending Treats </h2>
        <div id="trending-grid" class="trending-grid">
            </div>
    </div>

    <script>
        const cakeData = [
            { name: "Midnight Truffle", price: 45, img: "kek.jpg" },
            { name: "Strawberry Delight", price: 38, img: "red.jpeg" },
            { name: "Blueberry Cheesecake", price: 35, img: "beri.jpg" }
        ];

        window.onload = () => {
            const grid = document.getElementById('trending-grid');
            cakeData.forEach(cake => {
                grid.innerHTML += `
                    <div class="cake-card">
                        <img src="${cake.img}" alt="${cake.name}">
                        <h3 style="color: var(--cream);">${cake.name}</h3>
                        <p style="font-size: 1.2rem; font-weight: bold; color: var(--cream);">$${cake.price}</p>
                        <button class="btn-cream" style="cursor:pointer">Add to Cart</button>
                    </div>
                `;
            });
            
            const cart = JSON.parse(localStorage.getItem('VC_CART')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        };
    </script>
</body>
</html>
