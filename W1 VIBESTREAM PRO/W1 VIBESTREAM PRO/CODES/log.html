<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">          
    <title> VibeStream Pro || Log In </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style> 
        * { 
            margin: 0;
            padding: 0; 
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            width: 100%;
            /* FIXED: Removed space after linear-gradient */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('logback.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header {
            position: absolute;
            top: 0;
            right: 0;
            padding: 30px 60px;
        }

        header nav a {
            text-decoration: none;
            color: white; /* Changed to white to see it better on dark backgrounds */
            margin: 0 15px;
            font-size: 14px; /* FIXED: Removed single quote */
            font-weight: 600;
            letter-spacing: 1px;
        }

        .login-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.1);   
            backdrop-filter: blur(25px);            
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        .login-card h2 {
            font-size: 28px; /* FIXED: Removed space between 28 and px */
            margin-bottom: 40px;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .input-group {
            position: relative; /* FIXED: Changed 'positive' to 'position' */
            margin-bottom: 35px;
            border-bottom: 2px solid white; 
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            pointer-events: none;
            transition: 0.3s ease;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px;
            font-size: 12px;
            color: #fff;
        }

        .icon {
            position: absolute;
            right: 0;
            top: 10px;
            opacity: 0.7;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .options a {
            color: white;
            text-decoration: none;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #5d87b1;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .login-btn:hover { background: #4a6d91; }

        .footer-text { margin-top: 25px; font-size: 13px; }
        .footer-text a { color: white; text-decoration: none; font-weight: 600; margin-left: 5px; }

    </style>
</head>
<body>

<header>
  <nav> 
     <a href="VG.html"> HOME </a>
     <a href="About.html"> ABOUT </a>
     <a href="Contact.html"> CONTACT </a>
     <a href="log.html" class="nav-login"> LOG-IN </a>
  </nav>
</header>

<div class="login-card">
    <h2> VibeStream Pro </h2> 

    <form> 
        <div class="input-group">
            <input type="text" required>
            <label> Email </label>
            <span class="icon">✉</span>
        </div>

        <div class="input-group">
            <input type="password" required>
            <label> Password </label>
            <span class="icon">👁</span>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn"> Login </button>
        <div class="footer-text"> Don't have an Account? <a href="#"> Register </a></div>
    </form>
</div>

</body>
</html>
