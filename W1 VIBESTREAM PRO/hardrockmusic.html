<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> VibeStream Pro || Hardrock Music </title>
    <style> 
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /*---HEADER AND NAVIGATION---*/
        .header-nav {
            background-color: black;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .left-nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #81947E;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .custom-icon { width: 24px; height: 24px; }
        .site-logo { height: 30px; margin-left: 10px; }

        /*---MAIN CONTENT---*/
        .main-content {
            flex: 1;
            padding: 24px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        h2 { margin: 40px 0 20px 0; font-size: 24px; color: #1DB954; }

        /*--- COLUMN LIST ---*/
        .column-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            display: flex;
            align-items: center;
            background-color: #181818;
            border-radius: 12px;
            overflow: hidden;
            padding-right: 20px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            transition: background-color 0.3s;
        }

        .card:hover {
            background-color: #222;
        }

        .card-img img {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }

        .card-text {
            padding: 0 20px; 
            font-weight: bold;
            font-size: 16px;
            flex: 1; /* Pushes the audio player to the right */
        }

        /*--- STYLING THE AUDIO PLAYER ---*/
        audio {
            height: 35px;
            filter: invert(100%) hue-rotate(90deg) brightness(1.5);
            opacity: 0.8;
        }

        audio:hover {
            opacity: 1;
        }

        /*--- VIDEO BOX ---*/
        .month { 
            height: 400px; width: 100%;
            border-radius: 20px;
            overflow: hidden; 
            background-color: #000;
            margin-top: 20px;
            margin-bottom: 50px;
        }
        .month video { width: 100%; height: 100%; object-fit: cover; }   

        .footer {
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <header class="header-nav">
        <div class="left-nav">
            <a href="VG.html" class="nav-item">
                <img src="homeicon.png" class="custom-icon"> HOME 
            </a>
            <img src="logo.png" class="site-logo" alt="LOGO">
        </div>
        <div class="header-right">
            <div class="search-container">
                <input type="text" placeholder="Search OPM..." style="background: #242424; color: white; border: none; padding: 10px; border-radius: 20px;">
            </div>
        </div>
    </header>

    <main class="main-content">
        
        <h2> Trending Hardrock Music </h2>

        <div class="column-list">
            
            <div class="card">
                <div class="card-img"><img src="wale.jpg"></div>
                <div class="card-text"> Pinoy Hip-Hop Essentials </div>
                <audio controls src="song1.mp3"></audio>
            </div>

            <div class="card">
                <div class="card-img"><img src="love.jpg"></div>
                <div class="card-text"> OPM Love Songs 2026 </div>
                <audio controls src="song2.mp3"></audio>
            </div>

            <div class="card">
                <div class="card-img"><img src="rock.jpg"></div>
                <div class="card-text"> Pinoy Rock Classics </div>
                <audio controls src="song3.mp3"></audio>
            </div>

            <div class="card">
                <div class="card-img"><img src="Kpop.jpg"></div>
                <div class="card-text"> P-Pop Rise </div>
                <audio controls src="song4.mp3"></audio>
            </div>

        </div>

        <h2> Song of the Month </h2>
        <div class="month"> 
            <video autoplay muted loop playsinline>
                <source src="PPRES.mp4" type="video/mp4">
            </video>
        </div>

        <div class="footer"> 
            <p style="font-size: 14px; color: #888;"> ALL RIGHTS RESERVED - VIBESTREAM PRO 2026 </p> 
        </div>
    </main>

</body>
</html>
