<!DOCTYPE html>
<html>
<head>
<title> MUSICAT || ABOUT US </title>

<style> 

body {
    background-color: BLACK;
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Top banner */
.c1 {
    border: 1px solid black; 
    height: 280px; 
    width: 100%;
    border-radius: 30px;
}

/* Sidebar */
.c2 {
    border: 1px solid black; 
    margin-top: 20px; 
    width: 20%; 
    height: 500px; 
    float: left; 
    background-color: #5EED18;
    border-radius: 30px;
    padding: 20px; 
    box-sizing: border-box;     
    font-family: "Arial Black", sans-serif; 
}

.c2 a {
    color: black;
    text-decoration: none;
    display: block; 
    transition: 0.2s; 
    margin-bottom: 10px;
}

.c2 a:hover {
    color: #41B509; 
}

/* Main content */
.c3 {
    border: 1px solid black; 
    margin-top: 20px;
    width: 79%; 
    float: right; 
    padding: 20px;
    box-sizing: border-box;
}

/* Header inside c3 */
.C31 {
    border: 1px solid black; 
    width: 90%; 
    height: 90px;
    background-color: #5EED18;
    font-family: "Arial Black", sans-serif;
    border-radius: 30px;
    margin: 0 auto 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Box inside c3 under header */
.C32 {
    border: 1px solid black;       
    background-color: #5EED18;     
    border-radius: 20px;           
    padding: 20px;                 
    margin: 0 auto;               
    box-sizing: border-box;
    width: 90%;
}

/* Optional: text styling inside C32 */
.C32 p {
    font-size: 16px;
    color: #000;
    line-height: 1.5;
}

</style>
</head>

<body>

<!-- Banner -->
<div class="c1"> 
    <img src="banner.png" width="100%" height="280" style="border-radius: 30px;">
</div>

<!-- Sidebar -->
<div class="c2">
    <img src="logo.png" style="width: 100%; height: auto; margin-bottom: 10px;">
    
    <hr style="border: 1px dashed black;"> 
    <a href="log.html">SIGN UP</a>
    <a href="About.html">ABOUT US</a>
    <a href="gallery.html">HOME GALLERY</a>
    <a href="Contact.html">CONTACT US</a>
</div>

<!-- Main content -->
<div class="c3">

    <!-- Header -->
    <div class="C31"> 
        <h1>- ABOUT US -</h1>
    </div> 

    <!-- Box under header -->
    <div class="C32">
        <p>
            Welcome to <strong>MUSICAT</strong>! <br><br>
            We mostly focus on OPMs. <br><br>
            Explore our gallery, discover new songs, and immerse yourself in the world of music with MUSICAT.
        </p>
    </div>

</div>

</body>
</html>
