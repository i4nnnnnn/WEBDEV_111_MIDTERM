<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Luna Vista Resort || Log In </title>
    
    <style>
        :root {
            --primary-dark: #0a0a0a; 
            --accent-red: #c41e3a;   
            --logo-red: #ff3b3b;  
            --text-light: #e0e0e0;
            --glass-dark: rgba(20, 20, 20, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start; 
            padding: 1rem 5%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0; 
            margin-top: 15px; 
        }

        .logo-img {
            height: 75px; 
            width: auto;
            margin-right: -8px; 
            filter: drop-shadow(0 0 5px rgba(255, 59, 59, 0.3));
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
        }

        .logo-img:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 12px rgba(255, 59, 59, 0.6));
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            margin-top: 25px;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-red);
        }

        /* Video Background Styling */
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 0;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
        }

        
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            z-index: 2; 
            position: relative;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-text h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1;
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--accent-red);
            padding-left: 20px;
        }

        .login-card {
            background: var(--glass-dark);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(196, 30, 58, 0.2); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .login-card h2 {
            margin-bottom: 2rem;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-red);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.75rem;
            font-weight: bold;
            color: #888;
        }

        input {
            width: 100%;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #333;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-red);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            background: var(--accent-red);
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn-submit:hover {
            background: var(--logo-red);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.4);
        }

        footer {
            text-align: center;
            padding: 2rem;
            background: #050505;
            color: #444;
            font-size: 0.8rem;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; gap: 0.5rem; }
            .logo-container, .nav-links { margin-top: 10px; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="LVRLOGO.png" alt="Logo" class="logo-img">
            <span class="brand-name"> Luna Vista Resort </span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Reserve</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero-section">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="bitch.mp4" type="video/mp4">
        </video>
        
        <div class="video-overlay"></div>

        <div class="container grid-layout">
            <section class="hero-text">
                <h1> WHERE PASSION MEETS <br> <span style="color: var(--accent-red);"> PARADISE </span></h1>
                <p> Immerse yourself in the waves. Go with the flow in RED. </p>
            </section>
            
            <section class="login-card">
                <h2> Member Login </h2>
                <form id="darkLoginForm">
                    <div class="form-group">
                        <label> Enter Username </label>
                        <input type="email" placeholder="email@address.com" required>
                    </div>
                    <div class="form-group">
                        <label> Enter Password </label>
                        <input type="password" placeholder="........." required>
                    </div>
                    <button type="submit" class="btn-submit"> Log In </button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Luna Vista Resort | Where Paradise Meets Red. </p>
    </footer>

    <script>
        document.getElementById('darkLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Access Granted. Redirecting...");
        });
    </script>
</body>
</html>
